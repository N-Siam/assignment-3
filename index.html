<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Lato font from google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind and Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.4.0/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- tailwind customize color -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clifford: '#da373d',
                    }
                }
            }
        }
    </script>

    <style>
        .font-lato {
            font-family: 'Lato',
                sans-serif;
        }
    </style>

</head>

<body>

    <header>
        <!-- navbar section starts here -->
        <nav class="md:w-[1100px] md:mx-auto grid grid-cols-2  bg-[#F85559] rounded-full px-5">
            <div class="">
                <ul class="menu menu-horizontal text-[#FFF;] pt-3 ">
                    <li><a>Home</a></li>
                    <li><a>About Us</a></li>
                    <li><a>Shop</a></li>
                    <li><a>All Fruits</a></li>
                </ul>
            </div>
            <div class="navbar pr-0 flex-1 justify-between">
                <div class="flex-1">
                    <img class="w-10 h-10" src="./images/logo.png" alt="">
                    <a class="btn btn-active  bg-[#F85559] border-none normal-case text-xl text-[#FFF;]">Fruit Burst</a>
                </div>
                <div class="flex-1">
                    <div class="">
                        <input type="text" placeholder="Search"
                            class="input input-bordered w-40 h-8 md:w-auto bg-[#FFF;] rounded-full" />
                        <i class="fa-regular fa-magnifying-glas text-black"></i>
                    </div>

                </div>


        </nav>


    <!-- carousel section starts -->
    <div class="carousel md:w-[1100px] md:mx-auto pt-5">
        <div id="slide1" class="carousel-item relative w-full">
          <img src="./images/banner1.png" class="w-full" />
          <div class="absolute flex justify-between transform -translate-y-1/2 left-5 right-5 top-1/2">
              <a href="#slide4" class="btn btn-circle">❮</a> 
              <h2 class="text-white text-7xl justify-center align-middle">Exotic tastes at your <br>doorstep</h2>
            <a href="#slide2" class="btn btn-circle">❯</a>
          </div>
        </div> 
        <div id="slide2" class="carousel-item relative w-full">
          <img src="./images/banner2.png" class="w-full" />
          <div class="absolute flex justify-between transform -translate-y-1/2 left-5 right-5 top-1/2">
            <a href="#slide1" class="btn btn-circle">❮</a> 
            <a href="#slide3" class="btn btn-circle">❯</a>
          </div>
        </div> 
        <div id="slide3" class="carousel-item relative w-full">
          <img src="./images/banner3.png" class="w-full" />
          <div class="absolute flex justify-between transform -translate-y-1/2 left-5 right-5 top-1/2">
            <a href="#slide2" class="btn btn-circle">❮</a> 
            <a href="#slide4" class="btn btn-circle">❯</a>
          </div>
        </div> 
        <div id="slide4" class="carousel-item relative w-full">
          <img src="./images/banner4.png" class="w-full" />
          <div class="absolute flex justify-between transform -translate-y-1/2 left-5 right-5 top-1/2">
            <a href="#slide3" class="btn btn-circle">❮</a> 
            <a href="#slide1" class="btn btn-circle">❯</a>
          </div>
        </div>
      </div>
    </header>

    <main>

    </main>
</body>

</html>
